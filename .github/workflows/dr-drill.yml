name: DR Drill

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

jobs:
  dr-drill:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: server-node
    steps:
      - uses: actions/checkout@v4
      - name: Run DR drill (if DB secrets configured)
        shell: pwsh
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          if (-not $env:DB_HOST -or -not $env:DB_PORT -or -not $env:DB_USER -or -not $env:DB_PASSWORD -or -not $env:DB_NAME) {
            Write-Host "Skipping DR drill (DB secrets not configured)."
            exit 0
          }
          npm run run-dr-drill

