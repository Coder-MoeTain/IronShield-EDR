name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server-node/package-lock.json
      - name: Install
        run: npm ci
      - name: Syntax check
        run: node -c src/index.js

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-node/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server-node/dashboard/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

